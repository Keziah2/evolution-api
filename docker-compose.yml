version: "3.8"
services:
  api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:latest
    restart: always
    depends_on:
      - redis
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - bw-services       # Pour BunkerWeb
      - postgres_network  # Pour Postgres Externe
      - evolution-net
    env_file:
      - .env
    expose:
      - "8080"

  # Manager construit depuis les sources locales (sous-module)
  manager:
    container_name: evolution_manager
    build: ./evolution-manager-v2
    restart: always
    depends_on:
      - api
    networks:
      - bw-services
      - evolution-net
    expose:
      - "80"

  redis:
    container_name: evolution_redis
    image: redis:latest
    restart: always
    command: >
      redis-server --port 6379 --appendonly yes
    volumes:
      - evolution_redis:/data
    networks:
      evolution-net:
        aliases:
          - evolution-redis
    expose:
      - "6379"

volumes:
  evolution_instances:
  evolution_redis:

networks:
  bw-services:
    external: true
  postgres_network:
    external: true
  evolution-net:
    name: evolution-net
    external: true
